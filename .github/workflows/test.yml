name: image-annotator-lib Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Python 3.14 は upstream dep (torch 2.12 / tensorflow 2.21 / onnxruntime 1.23)
    # が cp314 wheel を提供するまで棚上げ。torch + tensorflow が 3.14 対応した時点で
    # matrix に再追加 + pyproject の upper bound を緩める。
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false
    env:
      HF_HUB_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        # ADR 0001 amended (2026-05-18): downloads_and_runs_model / calls_real_webapi は
        # CI 不経由 marker のため除外。
        run: |
          uv run pytest \
            -m "not downloads_and_runs_model and not calls_real_webapi" \
            --cov=image_annotator_lib \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=0

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
